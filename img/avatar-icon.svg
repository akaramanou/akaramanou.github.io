<svg width="100%" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="avatarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#avatarGradient)"/>
  
  <!-- Head -->
  <circle cx="100" cy="70" r="28" fill="#FFFFFF" opacity="0.95"/>
  
  <!-- Shoulders/Body -->
  <path d="M 72 95 Q 72 105 100 105 Q 128 105 128 95 L 128 150 Q 128 165 100 165 Q 72 165 72 150 Z" fill="#FFFFFF" opacity="0.95"/>
  
  <!-- AI/Tech indicator - geometric elements -->
  <g opacity="0.7">
    <!-- Left side tech dots -->
    <circle cx="50" cy="80" r="3" fill="#E0E7FF"/>
    <circle cx="55" cy="90" r="2.5" fill="#E0E7FF"/>
    <circle cx="58" cy="100" r="2" fill="#E0E7FF"/>
    
    <!-- Right side tech dots -->
    <circle cx="150" cy="85" r="3" fill="#E0E7FF"/>
    <circle cx="145" cy="95" r="2.5" fill="#E0E7FF"/>
    <circle cx="142" cy="105" r="2" fill="#E0E7FF"/>
    
    <!-- Connecting lines (subtle) -->
    <line x1="50" y1="80" x2="100" y2="70" stroke="#E0E7FF" stroke-width="0.5" opacity="0.6"/>
    <line x1="150" y1="85" x2="100" y2="70" stroke="#E0E7FF" stroke-width="0.5" opacity="0.6"/>
  </g>
  
  <!-- Placeholder text -->
  <text x="100" y="175" text-anchor="middle" style="font-size:12px;fill:#FFFFFF;font-weight:500;font-family:sans-serif">Research AI</text>
</svg>
