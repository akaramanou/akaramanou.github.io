---
layout: default
---

<article class="project">
  <header>
    <h1>{{ page.title }}</h1>
    <p class="meta">
      <strong>Status:</strong> {{ page.status }}<br>
      {% if page.github %}
      <a href="{{ page.github }}">View on GitHub</a>
      {% endif %}
    </p>
  </header>

  <div class="content">
    {{ content }}
  </div>

  {% if page.links %}
  <div class="project-links">
    <h3>Links</h3>
    <ul>
    {% for link in page.links %}
      <li><a href="{{ link.url }}">{{ link.title }}</a></li>
    {% endfor %}
    </ul>
  </div>
  {% endif %}
</article>
