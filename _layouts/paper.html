---
layout: default
---

<article class="paper">
  <header>
    <h1>{{ page.title }}</h1>
    <p class="meta">
      <strong>Authors:</strong> {{ page.authors }}<br>
      <strong>Year:</strong> {{ page.year }}<br>
      <strong>Venue:</strong> {{ page.venue }}
    </p>
  </header>

  <div class="content">
    {{ content }}
  </div>

  {% if page.pdf %}
  <div class="paper-links">
    <a href="{{ page.pdf }}" class="btn">Download PDF</a>
  </div>
  {% endif %}

  {% if page.bibtex %}
  <details>
    <summary>BibTeX</summary>
    <pre>{{ page.bibtex }}</pre>
  </details>
  {% endif %}
</article>
