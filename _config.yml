# Jekyll Configuration for Research Website

title: Your Research
author: Your Name
description: Research papers and projects
baseurl: "" # Leave empty for root domain
url: "https://yourname.com" # Update with your domain

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Collections for organizing research
collections:
  papers:
    output: true
    permalink: /papers/:name/
  projects:
    output: true
    permalink: /projects/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "papers"
    values:
      layout: "paper"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

# Exclude from processing
exclude:
  - .gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
